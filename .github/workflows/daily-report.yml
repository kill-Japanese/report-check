name: 每日报表生成
on:
  schedule:
    - cron: '20 0 * * *'  # UTC 0:20 = 北京时间 8:20
  workflow_dispatch:       # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install pandas openpyxl -q

      - name: 下载最新 Excel 数据源
        run: |
          # 如果你把 Excel 存在仓库里，这步可以跳过
          # 否则可以从云存储下载，例如：
          # wget -O 数据源.xlsx "你的下载链接"
          echo "使用仓库中的数据源文件"

      - name: 生成点检报表
        run: python 更新点检表.py
        env:
          TZ: Asia/Shanghai

      - name: 上传报表
        uses: actions/upload-artifact@v4
        with:
          name: 点检报表_${{ github.run_id }}
          path: |
            项目延期点检表.html
            项目延期点检表.xlsx
          retention-days: 30

      - name: 发送通知（可选）
        run: |
          echo "报表生成完成！"
          echo "请在 Actions 页面下载报表"
